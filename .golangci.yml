version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  exclusions:
    generated: lax
    # Kafka wire helpers retained for protocol completeness / future Fetch paths.
    rules:
      - linters:
          - unused
        path: kafka/
    paths:
      - third_party$
      - builtin$
      - ^examples/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/iome-sh/iomesh-client-sdk-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
