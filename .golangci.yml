run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/iome-sh/iomesh-client-sdk-go

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
