name: Bug report
description: Unexpected SDK behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Do not include API tokens, HMAC secrets, or customer payloads.**
        Security issues → private advisory or security@iome.sh ([SECURITY.md](../SECURITY.md)).
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal Go snippet or steps (redact secrets).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Module version
      description: Output of `go list -m github.com/iome-sh/iomesh-client-sdk-go`
    validations:
      required: true
  - type: input
    id: go
    attributes:
      label: Go version
      placeholder: go1.24.x
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran `go test ./...` against this module (or can reproduce with a minimal program)
        - label: I redacted tokens/secrets from this report
